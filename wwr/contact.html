<!-- HEAD -->

<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us | white water rafting</title>
  <meta name="description"
    content="Get in touch with our White Water Rafting team. Contact us for bookings, inquiries, and more information about your next rafting adventure.">
  <meta name="author" content="Ediomo Ebong">
  <link rel="stylesheet" href="styles/contact.css">
</head>


<!-- BODY-HEADER -->

<body>
  <header class="site-header">
    <img src="images/wwr-logo.jpg" alt="wwr logo">
    <nav class="main-nav">
      <ul class="navigation">
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About Us</a></li>
        <li><a href="trips.html">Trips</a></li>
        <li><a href="contact.html">Contact Us</a></li>
      </ul>
    </nav>
  </header>


  <!-- MAIN CONTENT -->
  <main class="contact-page">

    <!-- COMPANY INFO -->
    <section class="company-info">
      <h1>White Water Rafting Company</h1>
      <p>123 Main River Street</p>
      <p>Kolob, California</p>
      <p>+1 (999) 999-9999</p>
      <p>
        <a href="mailto:info@whitewater.com">info@whitewater.com</a>
      </p>
    </section>

    <!-- MAP AND FORM -->
    <section class="contact-grid">

      <!-- GOOGLE MAP -->
      <div class="map">
        <iframe
          src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3153.086962523041!2d-113.221632!3d37.298202!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x80cae5b38d4fbd6b%3A0x2a77b70c5d01a3b2!2sKolob%2C%20UT!5e0!3m2!1sen!2sus!4v1700000000000"
          loading="lazy" referrerpolicy="no-referrer-when-downgrade">
        </iframe>
      </div>

      <!-- CONTACT FORM -->
      <form class="contact-form" action="#" method="post">

        <label for="name">Name</label>
        <input type="text" id="name" name="name" required>

        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>

        <fieldset>
          <legend>Message Purpose</legend>

          <label>
            <input type="radio" name="purpose" value="general" required>
            General Inquiry
          </label>

          <label>
            <input type="radio" name="purpose" value="reservation">
            Reservation Question
          </label>

          <label>
            <input type="radio" name="purpose" value="website">
            Website Suggestion
          </label>
        </fieldset>

        <label for="message">Message</label>
        <textarea id="message" name="message" rows="5" required></textarea>

        <label class="checkbox">
          <input type="checkbox" name="newsletter">
          Please subscribe me to the monthly newsletter
        </label>

        <button type="submit">Get in Touch!</button>

      </form>
    </section>

    <!-- EMPLOYEE PROFILES -->
    <section class="employees">
      <h2>We Are Here to Serve You</h2>

      <div class="employee-grid">
        <figure>
          <img src="images/figure33.jpg" alt="Operations Manager">
          <figcaption>Alex Morgan – Operations Manager</figcaption>
        </figure>

        <figure>
          <img src="images/figure22.jpg" alt="Lead River Guide">
          <figcaption>Jamie Rivers – Lead River Guide</figcaption>
        </figure>

        <figure>
          <img src="images/figure11.jpg" alt="Customer Support Specialist">
          <figcaption>Taylor Brooks – Customer Support Specialist</figcaption>
        </figure>
      </div>
    </section>

  </main>

  <!-- FOOTER -->
  <footer class="site-footer">
    <p>© 2026 White Water Rafting Company | Ediomo Victor Ebong</p>

    <nav class="socialmedia">
      <a href="#"><img src="images/facebookicon.png" alt="Facebook"></a>
      <a href="#"><img src="images/linkedinicon.png" alt="LinkedIn"></a>
      <a href="#"><img src="images/igicon.jpg" alt="Instagram"></a>
    </nav>
  </footer>

</body>

</html>
